<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>品牌避雷查詢</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell" aria-labelledby="pageTitle">
    <header class="page-header">
      <h1 id="pageTitle">品牌避雷查詢</h1>
      <p id="dataStatus" class="data-status" aria-live="polite">資料狀態：尚未載入</p>
    </header>

    <section class="official-list-notice" aria-labelledby="officialListTitle">
      <h2 id="officialListTitle">近期油品下游官方名單</h2>
      <p>
        彰化縣衛生局公告中聯油脂／泰山 4–6 月受影響油品下游業者清單。可直接開啟官方 PDF 搜尋業者名稱；
        本站不把完整下游名單灌入主搜尋，避免把官方流向名單誤寫成品牌永久避雷。
      </p>
      <p class="official-list-links">
        <a href="https://www.chshb.gov.tw/sites/default/files/2026-07/4-6%E6%9C%88%E5%8F%97%E5%BD%B1%E9%9F%BF%E6%B2%B9%E5%93%81%E4%B8%8B%E6%B8%B8%E6%A5%AD%E8%80%85%E6%B8%85%E5%96%AE.pdf" target="_blank" rel="noreferrer">開啟官方 PDF 名單</a>
        <span aria-hidden="true">／</span>
        <a href="https://www.chshb.gov.tw/node/219119868" target="_blank" rel="noreferrer">查看彰化縣衛生局公告頁</a>
      </p>
    </section>

    <section class="query-panel" aria-label="查詢條件">
      <div class="search-field">
        <label for="searchInput">搜尋</label>
        <input id="searchInput" name="q" type="search" autocomplete="off" placeholder="輸入關鍵字；空白時按 Enter 顯示全部">
      </div>

      <div class="filter-grid">
        <label for="confidenceFilter">
          <span>可信度</span>
          <select id="confidenceFilter" name="confidence">
            <option value="">全部可信度</option>
          </select>
        </label>

        <label for="statusFilter">
          <span>狀態</span>
          <select id="statusFilter" name="status">
            <option value="">全部狀態</option>
          </select>
        </label>

        <label for="categoryFilter">
          <span>分類</span>
          <select id="categoryFilter" name="category">
            <option value="">全部分類</option>
          </select>
        </label>

        <label for="reasonFilter">
          <span>避買理由</span>
          <select id="reasonFilter" name="reason">
            <option value="">全部避買理由</option>
          </select>
        </label>
      </div>
    </section>

    <section class="result-summary" aria-label="查詢結果摘要">
      <p id="resultCount" aria-live="polite">結果計數：0</p>
    </section>

    <section id="warningBox" class="warning-box" aria-live="polite" hidden></section>

    <section id="results" class="results" aria-label="查詢結果"></section>

    <section id="emptyState" class="empty-state" aria-live="polite">
      目前沒有可顯示的品牌資料。
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
